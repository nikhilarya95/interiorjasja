name: Deploy to GitHub Pages
on:
  push:
    branches:
      - master 
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
      - name: Create .nojekyll 📄
        run: touch .nojekyll
      - name: Create config.js 🛠️
        run: |
          mkdir -p js
          cat <<EOF > js/config.js
          const CONFIG = {
              EMAILJS_PUBLIC_KEY: "${{ secrets.EMAILJS_PUBLIC_KEY }}",
              EMAILJS_SERVICE_ID: "${{ secrets.EMAILJS_SERVICE_ID }}",
              EMAILJS_TEMPLATE_ID: "${{ secrets.EMAILJS_TEMPLATE_ID }}"
          };
          EOF
      - name: Allow config.js to be deployed 🔓
        run: |
          # Remove js/config.js from .gitignore so the deploy action can see it
          sed -i '/js\/config.js/d' .gitignore || true
      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages