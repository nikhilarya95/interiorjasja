name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master  # Make sure this matches your default branch name (main or master)

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4 # Updated to v4 to fix the Node.js 20 deprecation warning

      - name: Create config.js 🛠️
        run: |
          mkdir -p js
          echo "const CONFIG = {" > js/config.js
          echo "    EMAILJS_PUBLIC_KEY: '${{ secrets.EMAILJS_PUBLIC_KEY }}'," >> js/config.js
          echo "    EMAILJS_SERVICE_ID: '${{ secrets.EMAILJS_SERVICE_ID }}'," >> js/config.js
          echo "    EMAILJS_TEMPLATE_ID: '${{ secrets.EMAILJS_TEMPLATE_ID }}'" >> js/config.js
          echo "};" >> js/config.js

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages
