    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tabBtns = document.querySelectorAll('.tab-btn');
            const photoGallery = document.getElementById('photo-gallery');
            const videoGallery = document.getElementById('video-gallery');
            const lightbox = document.getElementById('lightbox');
            const mediaContainer = document.getElementById('lightbox-media-container');
            const closeBtn = document.querySelector('.lightbox-close');
            const prevBtn = document.querySelector('.lightbox-prev');
            const nextBtn = document.querySelector('.lightbox-next');

            let currentItems = [];
            let currentIndex = 0;

            // Tab Switching Logic
            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const filter = btn.getAttribute('data-filter');
                    if (filter === 'photo') {
                        photoGallery.style.display = 'grid';
                        videoGallery.style.display = 'none';
                    } else {
                        photoGallery.style.display = 'none';
                        videoGallery.style.display = 'grid';
                    }
                });
            });

            // Lightbox Logic
            const updateLightboxMedia = () => {
                const item = currentItems[currentIndex];
                const type = item.getAttribute('data-type');
                let src;

                mediaContainer.innerHTML = '';
                if (type === 'photo') {
                    const img = item.querySelector('img');
                    src = img.src;
                    const newImg = document.createElement('img');
                    newImg.src = src;
                    mediaContainer.appendChild(newImg);
                } else if (type === 'video') {
                    src = item.getAttribute('data-src');
                    const video = document.createElement('video');
                    video.src = src;
                    video.controls = true;
                    video.autoplay = true;
                    video.playsInline = true;
                    mediaContainer.appendChild(video);
                    video.play().catch(e => console.error("Error playing video:", e));
                }
            };

            const openLightbox = (items, index) => {
                currentItems = items;
                currentIndex = index;
                updateLightboxMedia();
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
            };

            const closeLightbox = () => {
                lightbox.classList.remove('active');
                mediaContainer.innerHTML = '';
                document.body.style.overflow = 'auto';
            };

            const nextMedia = () => {
                currentIndex = (currentIndex + 1) % currentItems.length;
                updateLightboxMedia();
            };

            const prevMedia = () => {
                currentIndex = (currentIndex - 1 + currentItems.length) % currentItems.length;
                updateLightboxMedia();
            };

            // Event Listeners for Gallery Items
            const setupGalleryListeners = () => {
                const allGalleryItems = Array.from(document.querySelectorAll('.gallery-item'));

                allGalleryItems.forEach((item, index) => {
                    item.addEventListener('click', () => {
                        const filter = document.querySelector('.tab-btn.active').getAttribute('data-filter');
                        const activeItems = Array.from(document.querySelectorAll(`.gallery-item[data-type="${filter}"]`));
                        const activeIndex = activeItems.indexOf(item);
                        openLightbox(activeItems, activeIndex);
                    });
                });
            };

            setupGalleryListeners();

            nextBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                nextMedia();
            });

            prevBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                prevMedia();
            });

            closeBtn.addEventListener('click', closeLightbox);

            // Close on background click
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox();
            });

            // Close on Escape key and Arrow keys
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeLightbox();
                if (lightbox.classList.contains('active')) {
                    if (e.key === 'ArrowRight') nextMedia();
                    if (e.key === 'ArrowLeft') prevMedia();
                }
            });
        });
    </script>
